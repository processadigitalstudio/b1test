<style>

button{padding:12px 28px;background:#2d6a4f;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{background:#aaa;cursor:not-allowed}
#log{margin-top:1.5rem;font-size:13px;font-family:monospace;background:#f5f3ee;border-radius:10px;padding:1rem;max-height:400px;overflow-y:auto;line-height:1.8}
.ok{color:#166534}.err{color:#991b1b}.info{color:#555}
</style>
</head>
<body>
<div class="card">
  <h2>🔄 Migrar estudiantes a Firestore</h2>
  <p>Este script carga todos los estudiantes existentes en la base de datos de Firebase. Ábrelo una sola vez, haz clic en el botón y listo. Después puedes cerrar esta página.</p>

<script type="module">

function log(msg, cls='info'){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

window.migrate = async function(){
  document.getElementById('btn').disabled=true;
  log('Iniciando migración de '+STUDENTS.length+' estudiantes...');
  let ok=0, err=0;
  for(const s of STUDENTS){
    try{
      await setDoc(doc(db,'students',s.id),{
        name:s.name, id:s.id, pass:s.pass,
        createdAt:serverTimestamp()
      },{merge:true});
      log('✅ '+s.name,'ok');
      ok++;
    }catch(e){
      log('❌ Error con '+s.name+': '+e.message,'err');
      err++;
    }
  }
  log(`\n🎉 Listo: ${ok} estudiantes migrados, ${err} errores.`,'ok');
  log('Ya puedes cerrar esta página.','info');
};
</script>
